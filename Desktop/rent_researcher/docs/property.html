<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>物件情報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:#f8f9fa;color:#333}
/* ローディング */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:#888}
.loading .spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top:4px solid #4CAF50;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:14px}
/* エラー */
.error-card{background:#fff;border-radius:12px;padding:30px;max-width:400px;margin:40px auto;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.error-card h2{color:#E05252;margin-bottom:12px}
.error-card p{color:#666;line-height:1.6}
/* カルーセル */
.carousel{position:relative;width:100%;background:#000;overflow:hidden}
.carousel-inner{display:flex;transition:transform 0.3s ease;width:100%}
.carousel-slide{min-width:100%;display:flex;justify-content:center;align-items:center}
.carousel-slide img{width:100%;max-height:50vh;object-fit:contain}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.7);border:none;font-size:24px;padding:8px 12px;cursor:pointer;border-radius:50%;z-index:2}
.carousel-btn.prev{left:8px}
.carousel-btn.next{right:8px}
.carousel-dots{text-align:center;padding:8px;background:#000}
.carousel-dots .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.4);margin:0 3px;cursor:pointer}
.carousel-dots .dot.active{background:#fff}
.carousel-counter{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,0.6);color:#fff;font-size:12px;padding:4px 10px;border-radius:12px;z-index:2}
/* ヒーロー画像（1枚のみ） */
.hero{width:100%;max-height:50vh;object-fit:cover;display:block}
/* コンテンツ */
.content{max-width:600px;margin:0 auto;padding:20px}
.title{font-size:22px;font-weight:bold;color:#222;margin-bottom:8px}
.price-box{background:linear-gradient(135deg,#E05252,#ff6b6b);color:#fff;border-radius:12px;padding:16px;margin:12px 0}
.price-main{font-size:28px;font-weight:bold}
.price-sub{font-size:14px;opacity:0.9;margin-top:4px}
.section{background:#fff;border-radius:12px;padding:16px;margin:12px 0;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.section-title{font-size:14px;color:#888;font-weight:bold;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.row{display:flex;padding:8px 0;border-bottom:1px solid #f5f5f5}
.row:last-child{border-bottom:none}
.row-label{color:#888;font-size:14px;width:110px;flex-shrink:0}
.row-value{color:#333;font-size:14px;flex:1}
.facilities-text{font-size:13px;color:#555;line-height:1.7;white-space:pre-wrap}
.fac-cat{margin-bottom:10px}
.fac-cat-name{font-size:12px;color:#888;font-weight:bold;margin-bottom:4px}
.fac-tags{display:flex;flex-wrap:wrap;gap:4px}
.fac-tag{display:inline-block;font-size:12px;color:#444;background:#f0f4f8;border-radius:4px;padding:2px 8px;line-height:1.6}
.cond-ok{background:#e8f5e9;color:#2e7d32}
.cond-ng{background:#f5f5f5;color:#999}
.footer{text-align:center;padding:20px;color:#aaa;font-size:12px}
.customer-badge{text-align:center;padding:8px;font-size:12px;color:#888;letter-spacing:0.5px}
/* フィードバックボタン */
.feedback-bar{display:flex;gap:10px;margin:16px 0;padding:0}
.feedback-btn{flex:1;padding:14px 0;border-radius:12px;border:2px solid #e0e0e0;background:#fff;font-size:15px;font-weight:bold;cursor:pointer;transition:all 0.2s;text-align:center;color:#555}
.feedback-btn:active{transform:scale(0.97)}
.feedback-btn.fav{border-color:#F59E0B;color:#D97706;background:#FFFBEB}
.feedback-btn.fav.active{background:#F59E0B;border-color:#D97706;color:#fff;box-shadow:0 2px 8px rgba(245,158,11,0.3)}
.feedback-btn.nope{border-color:#9CA3AF;color:#6B7280;background:#F9FAFB}
.feedback-btn.nope.active{background:#6B7280;border-color:#4B5563;color:#fff;box-shadow:0 2px 8px rgba(107,114,128,0.3)}
.feedback-btn:disabled{opacity:0.6;cursor:not-allowed}
.feedback-status{text-align:center;font-size:13px;color:#888;margin:-8px 0 8px;min-height:18px}
/* アクションボタン */
.action-bar{display:flex;flex-direction:column;gap:10px;margin:20px 0 12px}
.action-btn{width:100%;padding:16px 0;border-radius:12px;border:none;font-size:16px;font-weight:bold;cursor:pointer;transition:all 0.2s;text-align:center}
.action-btn:active{transform:scale(0.97)}
.action-btn.primary{background:#4CAF50;color:#fff;box-shadow:0 2px 8px rgba(76,175,80,0.3)}
.action-btn.primary.active{background:#E8F5E9;color:#2E7D32;border:2px solid #4CAF50;box-shadow:none}
.action-btn.secondary{background:#fff;color:#4CAF50;border:2px solid #4CAF50}
.action-btn.secondary.active{background:#E8F5E9;color:#2E7D32;border-color:#4CAF50}
.action-btn:disabled{opacity:0.7;cursor:not-allowed;transform:none}
/* モーダル */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9000;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#fff;max-width:400px;width:100%;border-radius:16px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.modal-title{font-size:18px;font-weight:bold;text-align:center;margin-bottom:20px}
.modal-radio-group{display:flex;gap:10px;margin-bottom:16px}
.modal-radio-label{flex:1;text-align:center;padding:14px 8px;border:2px solid #e0e0e0;border-radius:10px;cursor:pointer;font-size:15px;font-weight:bold;color:#555;transition:all 0.2s}
.modal-radio-label.active{border-color:#4CAF50;background:#E8F5E9;color:#2E7D32}
.modal-radio-label input[type="radio"]{display:none}
.modal-input{width:100%;border:1px solid #ddd;border-radius:8px;padding:12px;font-size:15px;box-sizing:border-box}
.modal-input:focus{border-color:#4CAF50;outline:none}
.modal-input.error{border-color:#E05252}
.modal-error{color:#E05252;font-size:13px;margin-top:4px;min-height:18px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions .action-btn{flex:1}
.line-link{text-align:center;padding:16px;font-size:14px}
.line-link a{color:#06C755;text-decoration:none;font-weight:bold}
/* トースト通知 */
.toast{position:fixed;bottom:-100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:14px 20px;border-radius:12px;font-size:14px;line-height:1.5;max-width:calc(100% - 32px);width:360px;box-shadow:0 4px 20px rgba(0,0,0,0.25);z-index:9999;transition:bottom 0.3s ease;text-align:center}
.toast.show{bottom:24px}
.toast .toast-icon{font-size:20px;display:block;margin-bottom:4px}
.toast .toast-hint{font-size:12px;color:#aed;margin-top:6px;opacity:0.85}
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>物件情報を読み込んでいます...</p>
</div>

<div id="app" style="display:none"></div>

<script>
var GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyCqgB4lhAN0mGSi6acYl7bSWRg-TVHr9b_-I5vCsWYaOA5ceIfWh-5cqpGBLIFrHu7/exec';
var currentProperty = null; // renderProperty で保存、sendFeedback で利用

// ===== Base64エンコード済みデータをデコード（短縮キー → フルプロパティ名） =====
function decodePropertyData(encoded) {
  if (!encoded) return null;
  try {
    // URL-safe base64 → 標準 base64
    var standard = encoded.replace(/-/g, '+').replace(/_/g, '/');
    while (standard.length % 4 !== 0) standard += '=';
    var binary = atob(standard);
    // UTF-8 デコード
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    var jsonStr = new TextDecoder('utf-8').decode(bytes);
    var d = JSON.parse(jsonStr);
    // 短縮キー → フルプロパティ名にマッピング
    return {
      buildingName: d.bn || '',
      roomNumber: d.rn || '',
      rent: d.r || 0,
      managementFee: d.mf || 0,
      layout: d.l || '',
      area: d.a || 0,
      buildingAge: d.ba || '',
      stationInfo: d.si || '',
      address: d.ad || '',
      deposit: d.d || '',
      keyMoney: d.k || '',
      floorText: d.ft || '',
      floor: d.fl || 0,
      storyText: d.st || '',
      structure: d.str || '',
      totalUnits: d.tu || '',
      sunlight: d.sl || '',
      moveInDate: d.md || '',
      leaseType: d.lt || '',
      contractPeriod: d.cp || '',
      cancellationNotice: d.cn || '',
      renewalInfo: d.ri || '',
      freeRent: d.fr || '',
      shikibiki: d.sb || '',
      petDeposit: d.pd || '',
      renewalFee: d.rf || '',
      fireInsurance: d.fi || '',
      renewalAdminFee: d.ra || '',
      guaranteeInfo: d.gi || '',
      keyExchangeFee: d.ke || '',
      supportFee24h: d.sf24 || '',
      rightsFee: d.rig || '',
      additionalDeposit: d.adp || '',
      guaranteeDeposit: d.gd || '',
      waterBilling: d.wb || '',
      parkingFee: d.pk || '',
      bicycleParkingFee: d.bp || '',
      motorcycleParkingFee: d.mp || '',
      otherMonthlyFee: d.omf || '',
      otherOnetimeFee: d.oof || '',
      moveInConditions: d.mic || '',
      freeRentDetail: d.frd || '',
      layoutDetail: d.ld || '',
      facilities: d.fac || '',
      otherStations: d.os || [],
      images: d.imgs || []
    };
  } catch(e) {
    return null;
  }
}

// ===== 初期化 =====
var params = new URLSearchParams(window.location.search);
var customer = params.get('customer');
var roomId = params.get('room_id');

// 埋め込みデータ取得: クエリパラメータ d= を優先、旧形式のハッシュ # もフォールバック対応
var embeddedData = params.get('d') || (window.location.hash.length > 1 ? window.location.hash.substring(1) : null);
var inlineProp = decodePropertyData(embeddedData);

// 1. まず埋め込みデータを試す（即時描画 < 1秒）
if (inlineProp) {
  renderProperty(inlineProp);
  // 画像がデータに含まれていない場合、非同期で画像を取得
  if ((!inlineProp.images || inlineProp.images.length === 0) && customer && roomId) {
    fetchImages(customer, roomId);
  }
} else if (customer && roomId) {
  // 2. フォールバック: GAS API（旧リンク対応）
  fetchProperty(customer, roomId);
} else {
  showError('パラメータが不足しています。');
}

function fetchProperty(customer, roomId) {
  var url = GAS_API_URL + '?action=view_api&customer=' + encodeURIComponent(customer) + '&room_id=' + encodeURIComponent(roomId);

  fetch(url, { redirect: 'follow' })
    .then(function(res) { return res.text(); })
    .then(function(text) {
      var data;
      try { data = JSON.parse(text); } catch(e) { throw new Error('レスポンス解析エラー'); }
      if (data.error) throw new Error(data.error);
      renderProperty(data);
    })
    .catch(function(err) {
      showError(err.message || '物件情報の取得に失敗しました。');
    });
}

// ===== 画像非同期取得（ハッシュにテキストのみの場合、後から画像を読み込み） =====
function fetchImages(customer, roomId) {
  var url = GAS_API_URL + '?action=images_api&customer=' + encodeURIComponent(customer) + '&room_id=' + encodeURIComponent(roomId);

  fetch(url, { redirect: 'follow' })
    .then(function(res) { return res.text(); })
    .then(function(text) {
      var data;
      try { data = JSON.parse(text); } catch(e) { return; }
      var images = data.images || [];
      if (images.length === 0) return;
      // currentProperty に画像を保存（お気に入り登録時の dataHash に含めるため）
      if (currentProperty) currentProperty.images = images;
      // 画像プレースホルダーに挿入
      insertImages(images);
    })
    .catch(function() {});
}

function insertImages(images) {
  var placeholder = document.getElementById('image-placeholder');
  if (!placeholder) return;

  var html = '';
  if (images.length > 1) {
    html += '<div class="carousel" id="carousel">'
      + '<div class="carousel-inner" id="carouselInner">';
    for (var i = 0; i < images.length; i++) {
      html += '<div class="carousel-slide"><img src="' + escHtml(images[i]) + '" alt="物件画像 ' + (i+1) + '" loading="lazy"></div>';
    }
    html += '</div>'
      + '<button class="carousel-btn prev" onclick="slide(-1)">&lt;</button>'
      + '<button class="carousel-btn next" onclick="slide(1)">&gt;</button>'
      + '<div class="carousel-counter"><span id="slideNum">1</span> / ' + images.length + '</div>'
      + '</div>'
      + '<div class="carousel-dots" id="dots">';
    for (var i = 0; i < images.length; i++) {
      html += '<span class="dot' + (i === 0 ? ' active' : '') + '" onclick="goTo(' + i + ')"></span>';
    }
    html += '</div>';
  } else if (images.length === 1) {
    html += '<img class="hero" src="' + escHtml(images[0]) + '" alt="物件画像" loading="lazy">';
  }

  placeholder.innerHTML = html;
  // カルーセル初期化
  if (images.length > 1) {
    initCarousel();
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('app').innerHTML =
    '<div class="error-card"><h2>\u26a0\ufe0f エラー</h2><p>' + escHtml(msg) + '</p></div>';
}

// ===== 設備カテゴリタグ =====
var ES_HEADERS = ['駐車場','ライフライン','キッチン','バス・トイレ・洗面','位置・フロア','回線','給湯','室内仕様','収納','共有施設','構造・工法・仕様','特徴・設備','管理・防犯','屋外設備','区画設備','建物設備','セキュリティ','詳細','周辺環境','共用部'];

function buildFacilityTags(facStr) {
  // Itandi形式（【カテゴリ】）
  if (facStr.indexOf('\u3010') >= 0) return buildFacilityTagsFromItandi(facStr);
  // ES-Square形式検出: 半角カンマで分割してヘッダーが含まれるか
  var testSegs = facStr.split(/\s*,\s*/);
  var hasEs = false;
  for (var t = 0; t < testSegs.length; t++) {
    if (ES_HEADERS.indexOf(testSegs[t].trim()) >= 0) { hasEs = true; break; }
  }
  if (hasEs) return buildFacilityTagsFromES(facStr);
  // フォールバック: カンマ区切りプレーンテキスト（タグ表示のみ）
  var items = facStr.split(/[,、，\/\n]+/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
  var out = '<div class="fac-tags">';
  for (var i = 0; i < items.length; i++) out += '<span class="fac-tag">' + escHtml(items[i]) + '</span>';
  return out + '</div>';
}

// ES-Square形式: 半角カンマでヘッダーと値群を分離、全角カンマで値を分割
function buildFacilityTagsFromES(facStr) {
  // 括弧内のカンマを保護（最後まで維持、HTML出力時に復元）
  var prot = facStr.replace(/（[^）]*）/g, function(m) { return m.replace(/[,，]/g, '___P___'); });
  prot = prot.replace(/\([^)]*\)/g, function(m) { return m.replace(/[,，]/g, '___P___'); });
  // 数値内カンマ保護
  prot = prot.replace(/(\d),(\d)/g, '$1___C___$2');
  // 半角カンマで分割（ヘッダー / 値群の境界）
  var segments = prot.split(/\s*,\s*/);
  var order = [], buckets = {}, curCat = null;
  for (var i = 0; i < segments.length; i++) {
    var seg = segments[i].trim();
    if (!seg) continue;
    // ___P___/___C___を復元した値でヘッダー判定
    var segClean = seg.replace(/___P___/g, '，').replace(/___C___/g, ',');
    if (ES_HEADERS.indexOf(segClean) >= 0) {
      // 大セクション（区画設備/建物設備/セキュリティ）はスキップ、サブヘッダーを使う
      if (['区画設備','建物設備','セキュリティ','詳細'].indexOf(segClean) >= 0) continue;
      curCat = segClean;
      if (!buckets[curCat]) { buckets[curCat] = []; order.push(curCat); }
    } else {
      // 値群: 全角カンマで個別アイテムに分割（括弧内は___P___で保護されたまま）
      if (!curCat) { curCat = 'その他'; if (!buckets[curCat]) { buckets[curCat] = []; order.push(curCat); } }
      var vals = seg.split(/[，、]+/).map(function(s) {
        return s.replace(/___P___/g, '，').replace(/___C___/g, ',').trim();
      }).filter(function(s) {
        if (!s) return false;
        if (/^.+[:：]\s*(-|無)\s*$/.test(s)) return false;
        return true;
      });
      for (var v = 0; v < vals.length; v++) buckets[curCat].push(vals[v]);
    }
  }
  return renderFacBuckets(order, buckets);
}

function buildFacilityTagsFromItandi(facStr) {
  var lines = facStr.split('\n');
  var order = [], buckets = {};
  for (var i = 0; i < lines.length; i++) {
    var m = lines[i].match(/^\u3010(.+?)\u3011(.*)$/);
    if (m) {
      var cat = m[1], rest = m[2];
      if (!buckets[cat]) { buckets[cat] = []; order.push(cat); }
      var items = rest.split(/[\/ \/]+/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
      for (var j = 0; j < items.length; j++) buckets[cat].push(items[j]);
    }
  }
  return renderFacBuckets(order, buckets);
}

function renderFacBuckets(order, buckets) {
  var out = '';
  var allOrder = order.slice();
  if (buckets['\u305D\u306E\u4ED6'] && buckets['\u305D\u306E\u4ED6'].length > 0) allOrder.push('\u305D\u306E\u4ED6');
  for (var o = 0; o < allOrder.length; o++) {
    var name = allOrder[o], arr = buckets[name];
    if (!arr || arr.length === 0) continue;
    out += '<div class="fac-cat"><div class="fac-cat-name">' + escHtml(name) + '</div><div class="fac-tags">';
    for (var j = 0; j < arr.length; j++) {
      out += '<span class="fac-tag">' + escHtml(arr[j]) + '</span>';
    }
    out += '</div></div>';
  }
  return out;
}

function renderProperty(p) {
  currentProperty = p; // sendFeedback で使うためグローバルに保存
  var rentMan = p.rent ? (p.rent / 10000).toFixed(1) : '0';
  var mgmtMan = p.managementFee ? (p.managementFee / 10000).toFixed(1) : '0';
  var images = p.images || [];

  var html = '';

  // 画像表示（画像がない場合はプレースホルダーを配置、後から非同期挿入）
  if (images.length === 0) {
    html += '<div id="image-placeholder"></div>';
  } else if (images.length > 1) {
    html += '<div class="carousel" id="carousel">'
      + '<div class="carousel-inner" id="carouselInner">';
    for (var i = 0; i < images.length; i++) {
      html += '<div class="carousel-slide"><img src="' + escHtml(images[i]) + '" alt="物件画像 ' + (i+1) + '"></div>';
    }
    html += '</div>'
      + '<button class="carousel-btn prev" onclick="slide(-1)">&lt;</button>'
      + '<button class="carousel-btn next" onclick="slide(1)">&gt;</button>'
      + '<div class="carousel-counter"><span id="slideNum">1</span> / ' + images.length + '</div>'
      + '</div>'
      + '<div class="carousel-dots" id="dots">';
    for (var i = 0; i < images.length; i++) {
      html += '<span class="dot' + (i === 0 ? ' active' : '') + '" onclick="goTo(' + i + ')"></span>';
    }
    html += '</div>';
  } else if (images.length === 1) {
    html += '<img class="hero" src="' + escHtml(images[0]) + '" alt="物件画像">';
  }

  // コンテンツ
  html += '<div class="content">';
  if (customer) {
    html += '<div class="customer-badge">' + escHtml(customer) + ' 様専用ページ</div>';
  }
  html += '<div class="title">' + escHtml(p.buildingName || '') + (p.roomNumber ? ' ' + escHtml(p.roomNumber) : '') + '</div>';

  var priceSub = '管理費 ' + mgmtMan + '万円';
  if (hv(p.deposit)) priceSub += ' | 敷金 ' + escHtml(p.deposit);
  if (hv(p.keyMoney)) priceSub += ' | 礼金 ' + escHtml(p.keyMoney);
  html += '<div class="price-box">'
    + '<div class="price-main">' + rentMan + '万円<span style="font-size:16px">/月</span></div>'
    + '<div class="price-sub">' + priceSub + '</div>'
    + '</div>';

  // アクションボタン（customer と roomId がある場合のみ）
  if (customer && roomId) {
    html += '<div class="action-bar">'
      + '<button class="action-btn primary" id="holdBtn" onclick="openHoldModal()">🏠 この物件を仮押さえする</button>'
      + '</div>';
    // 仮押さえモーダル
    html += '<div class="modal-overlay" id="holdModal" onclick="if(event.target===this)closeHoldModal()">'
      + '<div class="modal-content">'
      + '<div class="modal-title">🏠 仮押さえ申込</div>'
      + '<div class="modal-radio-group">'
      + '<label class="modal-radio-label active" id="radioPersonal" onclick="selectRadio(\'個人\')">'
      + '<input type="radio" name="appType" value="個人" checked> 個人申込</label>'
      + '<label class="modal-radio-label" id="radioCorporate" onclick="selectRadio(\'法人\')">'
      + '<input type="radio" name="appType" value="法人"> 法人申込</label>'
      + '</div>'
      + '<input type="text" class="modal-input" id="contactInput" placeholder="メールアドレスまたは電話番号">'
      + '<div class="modal-error" id="contactError"></div>'
      + '<div class="modal-actions">'
      + '<button class="action-btn primary" onclick="submitHold()">申込を送信</button>'
      + '<button class="action-btn secondary" onclick="closeHoldModal()">キャンセル</button>'
      + '</div>'
      + '</div>'
      + '</div>';
  }

  // フィードバックボタン（customer と roomId がある場合のみ）
  if (customer && roomId) {
    html += '<div class="feedback-bar">'
      + '<button class="feedback-btn fav" id="favBtn" onclick="sendFeedback(\'favorite\')">\u2B50 お気に入りに追加</button>'
      + '<button class="feedback-btn nope" id="nopeBtn" onclick="sendFeedback(\'not_interested\')">\uD83D\uDC4E 興味なし</button>'
      + '</div>'
      + '<div class="feedback-status" id="feedbackStatus"></div>';
  }

  // 物件情報
  html += '<div class="section"><div class="section-title">物件情報</div>';
  var details = [];
  if (hv(p.layout)) details.push(['間取り', p.layout]);
  if (hv(p.layoutDetail)) details.push(['間取り詳細', p.layoutDetail]);
  if (p.area) details.push(['面積', p.area + 'm\u00b2']);
  if (hv(p.buildingAge)) details.push(['築年数', p.buildingAge]);
  if (hv(p.floorText)) details.push(['所在階', p.floorText]);
  else if (p.floor) details.push(['所在階', p.floor + '階']);
  if (hv(p.storyText)) details.push(['階建て', p.storyText]);
  if (hv(p.structure)) details.push(['構造', p.structure]);
  if (hv(p.totalUnits)) details.push(['総戸数', p.totalUnits]);
  if (hv(p.sunlight)) details.push(['主要採光面', p.sunlight]);
  if (hv(p.moveInDate)) details.push(['入居可能時期', p.moveInDate]);
  for (var i = 0; i < details.length; i++) {
    html += makeRow(details[i][0], details[i][1]);
  }
  html += '</div>';

  // アクセス
  html += '<div class="section"><div class="section-title">アクセス</div>';
  if (hv(p.stationInfo)) html += makeRow('最寄駅', p.stationInfo);
  var others = p.otherStations || [];
  for (var i = 0; i < others.length; i++) {
    if (hv(others[i])) html += makeRow('', others[i]);
  }
  if (hv(p.address)) html += makeRow('住所', p.address);
  html += '</div>';

  // 契約条件（値がある場合のみセクション表示）
  var contractRows = [];
  if (hv(p.leaseType)) contractRows.push(['契約区分', p.leaseType]);
  if (hv(p.contractPeriod)) contractRows.push(['契約期間', p.contractPeriod]);
  if (hv(p.cancellationNotice)) contractRows.push(['解約予告', p.cancellationNotice]);
  if (hv(p.renewalInfo)) contractRows.push(['更新・再契約可否', p.renewalInfo]);
  if (hv(p.freeRent)) contractRows.push(['フリーレント', p.freeRent]);
  if (hv(p.freeRentDetail)) contractRows.push(['フリーレント詳細', p.freeRentDetail]);
  if (contractRows.length > 0) {
    html += '<div class="section"><div class="section-title">契約条件</div>';
    for (var i = 0; i < contractRows.length; i++) {
      html += makeRow(contractRows[i][0], contractRows[i][1]);
    }
    html += '</div>';
  }

  // 費用（値がある場合のみセクション表示）
  var costRows = [];
  if (hv(p.shikibiki)) costRows.push(['敷引き/償却', p.shikibiki]);
  if (hv(p.petDeposit)) costRows.push(['ペット敷金追加', p.petDeposit]);
  if (hv(p.renewalFee)) costRows.push(['更新料', p.renewalFee]);
  if (hv(p.fireInsurance)) costRows.push(['火災保険料', p.fireInsurance]);
  if (hv(p.renewalAdminFee)) costRows.push(['更新事務手数料', p.renewalAdminFee]);
  if (hv(p.guaranteeInfo)) costRows.push(['保証料', p.guaranteeInfo]);
  if (hv(p.keyExchangeFee)) costRows.push(['鍵交換費用', p.keyExchangeFee]);
  if (hv(p.supportFee24h)) costRows.push(['24時間サポート費', p.supportFee24h]);
  if (hv(p.rightsFee)) costRows.push(['権利金', p.rightsFee]);
  if (hv(p.additionalDeposit)) costRows.push(['敷金積み増し', p.additionalDeposit]);
  if (hv(p.guaranteeDeposit)) costRows.push(['保証金', p.guaranteeDeposit]);
  if (hv(p.waterBilling)) costRows.push(['水道料金形態', p.waterBilling]);
  if (hv(p.parkingFee)) costRows.push(['駐車場代', p.parkingFee]);
  if (hv(p.bicycleParkingFee)) costRows.push(['駐輪場代', p.bicycleParkingFee]);
  if (hv(p.motorcycleParkingFee)) costRows.push(['バイク置き場代', p.motorcycleParkingFee]);
  if (hv(p.otherMonthlyFee)) costRows.push(['その他月次費用', p.otherMonthlyFee]);
  if (hv(p.otherOnetimeFee)) costRows.push(['その他一時金', p.otherOnetimeFee]);
  if (costRows.length > 0) {
    html += '<div class="section"><div class="section-title">費用</div>';
    for (var i = 0; i < costRows.length; i++) {
      html += makeRow(costRows[i][0], costRows[i][1]);
    }
    html += '</div>';
  }

  // 入居条件（チップ/バッジ表示）
  var condStr = p.moveInConditions || '';
  if (hv(condStr)) {
    html += '<div class="section"><div class="section-title">入居条件</div><div class="fac-tags">';
    var condItems = condStr.split(/[,、\/\n]+/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
    for (var ci = 0; ci < condItems.length; ci++) {
      var cond = condItems[ci];
      var tagClass = 'fac-tag';
      if (/不可/.test(cond)) {
        tagClass = 'fac-tag cond-ng';
      } else if (/可|相談|歓迎|不要|向き/.test(cond)) {
        tagClass = 'fac-tag cond-ok';
      }
      html += '<span class="' + tagClass + '">' + escHtml(cond) + '</span>';
    }
    html += '</div></div>';
  }

  // 設備・詳細（カテゴリ分けタグ表示）
  var facStr = typeof p.facilities === 'string' ? p.facilities : '';
  if (hv(facStr)) {
    html += '<div class="section"><div class="section-title">設備・詳細</div>';
    html += buildFacilityTags(facStr);
    html += '</div>';
  }

  html += '<div class="line-link">\uD83D\uDCAC <a href="https://line.me/R/" target="_blank">ご質問はLINEでお気軽にどうぞ</a></div>';
  html += '<div class="footer">\u203b 詳細は担当者にお問い合わせください</div>';
  html += '</div>';

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('app').innerHTML = html;
  document.title = (p.buildingName || '物件情報') + ' - 物件詳細';

  // カルーセル初期化（動的HTML注入後に実行）
  initCarousel();

  // フィードバック状態チェック
  checkFeedbackStatus();

  // アクション状態チェック
  checkActionStatus();

  // 閲覧トラッキング（アクションログに統合、fire-and-forget）
  if (customer && roomId) {
    try {
      var propData = currentProperty || {};
      var viewParams = 'action=property_action'
        + '&customer=' + encodeURIComponent(customer)
        + '&room_id=' + encodeURIComponent(roomId)
        + '&action_type=view'
        + '&building_name=' + encodeURIComponent(propData.buildingName || '')
        + '&room_number=' + encodeURIComponent(propData.roomNumber || '')
        + '&rent=' + encodeURIComponent(propData.rent || '')
        + '&layout=' + encodeURIComponent(propData.layout || '')
        + '&station_info=' + encodeURIComponent(propData.stationInfo || '');
      fetch(GAS_API_URL + '?' + viewParams, { redirect: 'follow' }).catch(function() {});
    } catch(e) {}
  }
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function nv(val) {
  if (!val || val === '入力なし') return 'ー';
  return val;
}

function hv(val) {
  return val && val !== '\u30FC' && val !== '入力なし';
}

function makeRow(label, value) {
  return '<div class="row"><span class="row-label">' + escHtml(label) + '</span><span class="row-value">' + escHtml(nv(value)) + '</span></div>';
}

// カルーセル操作
var cur = 0, total = 0;
function goTo(n) { if (total <= 0) return; cur = ((n % total) + total) % total; updateCarousel(); }
function slide(d) { if (total <= 0) return; cur = ((cur + d) % total + total) % total; updateCarousel(); }
function updateCarousel() {
  var inner = document.getElementById('carouselInner');
  if (!inner) return;
  inner.style.transform = 'translateX(-' + cur * 100 + '%)';
  document.getElementById('slideNum').textContent = cur + 1;
  var dots = document.querySelectorAll('.dot');
  for (var i = 0; i < dots.length; i++) { dots[i].className = i === cur ? 'dot active' : 'dot'; }
}

// カルーセル初期化（renderProperty から呼ばれる）
function initCarousel() {
  var el = document.getElementById('carousel');
  if (!el) return;
  var imgs = el.querySelectorAll('.carousel-slide');
  total = imgs.length;
  cur = 0;
  // タッチスワイプ
  var startX = 0;
  el.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, {passive: true});
  el.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) { slide(dx < 0 ? 1 : -1); }
  });
}

// ===== トースト通知 =====
function showToast(icon, message, hint, duration) {
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = '<span class="toast-icon">' + icon + '</span>' + escHtml(message)
    + (hint ? '<div class="toast-hint">' + escHtml(hint) + '</div>' : '');
  document.body.appendChild(el);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { el.classList.add('show'); });
  });
  setTimeout(function() {
    el.classList.remove('show');
    setTimeout(function() { el.remove(); }, 300);
  }, duration || 3000);
}

// ===== フィードバック機能 =====
var feedbackState = null;
var favoriteCount = 0; // 現在のお気に入り件数
var FAVORITE_LIMIT = 12;

function getFeedbackKey() {
  return 'feedback_' + customer + '_' + roomId;
}

function updateFeedbackUI(action) {
  feedbackState = action;
  var favBtn = document.getElementById('favBtn');
  var nopeBtn = document.getElementById('nopeBtn');
  var status = document.getElementById('feedbackStatus');
  if (!favBtn || !nopeBtn) return;

  favBtn.classList.remove('active');
  nopeBtn.classList.remove('active');

  if (action === 'favorite') {
    favBtn.classList.add('active');
    favBtn.textContent = '⭐ お気に入り済み ✓';
    nopeBtn.textContent = '👎 興味なし';
    status.textContent = '';
  } else if (action === 'not_interested') {
    nopeBtn.classList.add('active');
    nopeBtn.textContent = '👎 興味なし ✓';
    favBtn.textContent = '⭐ お気に入りに追加';
    status.textContent = '';
  } else {
    favBtn.textContent = '⭐ お気に入りに追加';
    nopeBtn.textContent = '👎 興味なし';
    status.textContent = '';
  }
}

function sendFeedback(action) {
  // 同じボタンを再度押した → リセット（デフォルトに戻す）
  if (feedbackState === action) {
    action = 'clear';
  }

  // お気に入り上限チェック
  if (action === 'favorite' && feedbackState !== 'favorite' && favoriteCount >= FAVORITE_LIMIT) {
    showToast('\u26A0\uFE0F',
      '\u304A\u6C17\u306B\u5165\u308A\u306F' + FAVORITE_LIMIT + '\u4EF6\u307E\u3067\u3067\u3059',
      '\u4ED6\u306E\u7269\u4EF6\u306E\u304A\u6C17\u306B\u5165\u308A\u3092\u89E3\u9664\u3057\u3066\u304B\u3089\u8FFD\u52A0\u3057\u3066\u304F\u3060\u3055\u3044', 3500);
    return;
  }

  // 楽観的UI更新: 即座にボタン状態を反映（API完了を待たない）
  var prevState = feedbackState;
  var prevCount = favoriteCount;
  updateFeedbackUI(action);

  // お気に入り件数を楽観的に更新
  if (action === 'favorite' && prevState !== 'favorite') favoriteCount++;
  else if (action === 'clear' && prevState === 'favorite') favoriteCount = Math.max(0, favoriteCount - 1);
  else if (action !== 'favorite' && prevState === 'favorite') favoriteCount = Math.max(0, favoriteCount - 1);

  // トースト通知
  if (action === 'favorite') {
    var remaining = FAVORITE_LIMIT - favoriteCount;
    showToast('\u2B50',
      '\u304A\u6C17\u306B\u5165\u308A\u30EA\u30B9\u30C8\u306B\u8FFD\u52A0\u3057\u307E\u3057\u305F\uFF08' + favoriteCount + '/' + FAVORITE_LIMIT + '\u4EF6\uFF09',
      'LINE\u3067\u300C\u304A\u6C17\u306B\u5165\u308A\u300D\u3068\u9001\u3063\u3066\u30EA\u30B9\u30C8\u3092\u78BA\u8A8D\u3057\u307E\u3057\u3087\u3046', 4000);
  } else if (action === 'not_interested') {
    showToast('\uD83D\uDC4E', '\u8208\u5473\u306A\u3057\u30EA\u30B9\u30C8\u306B\u8FFD\u52A0\u3057\u307E\u3057\u305F', '', 2500);
  } else if (action === 'clear' && prevState === 'favorite') {
    showToast('↩️', 'お気に入りを解除しました', '', 2000);
  } else if (action === 'clear' && prevState === 'not_interested') {
    showToast('↩️', '興味なしを解除しました', '', 2000);
  } else if (action === 'clear') {
    showToast('↩️', '設定を解除しました', '', 2000);
  }
  try {
    if (action === 'clear') {
      localStorage.removeItem(getFeedbackKey());
    } else {
      localStorage.setItem(getFeedbackKey(), action);
    }
  } catch(e) {}

  var propData = currentProperty || {};

  var params = 'action=property_action'
    + '&customer=' + encodeURIComponent(customer)
    + '&room_id=' + encodeURIComponent(roomId)
    + '&action_type=' + encodeURIComponent(action)
    + '&building_name=' + encodeURIComponent(propData.buildingName || '')
    + '&room_number=' + encodeURIComponent(propData.roomNumber || '')
    + '&rent=' + encodeURIComponent(propData.rent || '')
    + '&layout=' + encodeURIComponent(propData.layout || '')
    + '&station_info=' + encodeURIComponent(propData.stationInfo || '');

  // バックグラウンドでAPI送信（失敗時のみUIを戻す）
  fetch(GAS_API_URL + '?' + params, { redirect: 'follow' })
    .then(function(res) { return res.text(); })
    .then(function(text) {
      // 成功: サーバーからの正確なお気に入り件数で同期
      try {
        var data = JSON.parse(text);
        if (typeof data.favoriteCount === 'number') favoriteCount = data.favoriteCount;
      } catch(e) {}
    })
    .catch(function(err) {
      // 失敗: UIとカウントを元に戻す
      updateFeedbackUI(prevState);
      favoriteCount = prevCount;
      try {
        if (prevState) { localStorage.setItem(getFeedbackKey(), prevState); }
        else { localStorage.removeItem(getFeedbackKey()); }
      } catch(e) {}
      var status = document.getElementById('feedbackStatus');
      if (status) status.textContent = '通信エラー。もう一度お試しください。';
    });
}

function checkFeedbackStatus() {
  if (!customer || !roomId) return;

  // localStorage で即時UI反映
  try {
    var cached = localStorage.getItem(getFeedbackKey());
    if (cached) updateFeedbackUI(cached);
  } catch(e) {}

  // API同期は checkAllStatus() でまとめて行う
}

// ===== アクションボタン機能 =====
var actionState = null; // 'hold' | null

function getActionKey() {
  return 'action_' + customer + '_' + roomId;
}

function updateActionUI(actionType) {
  actionState = actionType;
  var holdBtn = document.getElementById('holdBtn');
  if (!holdBtn) return;

  holdBtn.classList.remove('active');
  holdBtn.disabled = false;

  if (actionType === 'hold' || actionType === 'viewing') {
    holdBtn.classList.add('active');
    holdBtn.textContent = '✅ 仮押さえリクエスト送信済み';
    holdBtn.disabled = true;
  }
}

// ===== 仮押さえモーダル =====
function openHoldModal() {
  if (actionState) return;
  var modal = document.getElementById('holdModal');
  if (modal) {
    modal.style.display = 'flex';
    var input = document.getElementById('contactInput');
    if (input) { input.value = ''; input.classList.remove('error'); }
    var err = document.getElementById('contactError');
    if (err) err.textContent = '';
  }
}

function closeHoldModal() {
  var modal = document.getElementById('holdModal');
  if (modal) modal.style.display = 'none';
}

function selectRadio(value) {
  var personal = document.getElementById('radioPersonal');
  var corporate = document.getElementById('radioCorporate');
  if (value === '個人') {
    personal.classList.add('active');
    corporate.classList.remove('active');
    personal.querySelector('input').checked = true;
  } else {
    corporate.classList.add('active');
    personal.classList.remove('active');
    corporate.querySelector('input').checked = true;
  }
}

function validateContact(val) {
  val = (val || '').trim();
  if (!val) return '連絡先を入力してください';
  var emailOk = /^[\w.+-]+@[\w.-]+\.\w{2,}$/.test(val);
  var phoneOk = /^[\d\-+()]{10,}$/.test(val);
  if (!emailOk && !phoneOk) return '有効なメールアドレスまたは電話番号を入力してください';
  return null;
}

function submitHold() {
  var checkedRadio = document.querySelector('input[name="appType"]:checked');
  var applicationType = checkedRadio ? checkedRadio.value : '個人';
  var contactInput = document.getElementById('contactInput');
  var contactInfo = (contactInput.value || '').trim();
  var errEl = document.getElementById('contactError');

  var error = validateContact(contactInfo);
  if (error) {
    contactInput.classList.add('error');
    errEl.textContent = error;
    return;
  }
  contactInput.classList.remove('error');
  errEl.textContent = '';

  closeHoldModal();
  sendAction('hold', applicationType, contactInfo);
}

function sendAction(actionType, applicationType, contactInfo) {
  if (actionState) return;

  updateActionUI(actionType);
  showToast('🏠', '仮押さえリクエストを送信しました', '担当者からご連絡いたします', 4000);

  try {
    localStorage.setItem(getActionKey(), JSON.stringify({
      action_type: actionType,
      application_type: applicationType || '',
      contact_info: contactInfo || ''
    }));
  } catch(e) {}

  var propData = currentProperty || {};
  var params = 'action=property_action'
    + '&customer=' + encodeURIComponent(customer)
    + '&room_id=' + encodeURIComponent(roomId)
    + '&action_type=' + encodeURIComponent(actionType)
    + '&application_type=' + encodeURIComponent(applicationType || '')
    + '&contact_info=' + encodeURIComponent(contactInfo || '')
    + '&building_name=' + encodeURIComponent(propData.buildingName || '')
    + '&room_number=' + encodeURIComponent(propData.roomNumber || '')
    + '&rent=' + encodeURIComponent(propData.rent || '')
    + '&layout=' + encodeURIComponent(propData.layout || '')
    + '&station_info=' + encodeURIComponent(propData.stationInfo || '');

  fetch(GAS_API_URL + '?' + params, { redirect: 'follow' })
    .then(function(res) { return res.text(); })
    .then(function(text) {
      try { JSON.parse(text); } catch(e) {}
    })
    .catch(function(err) {
      actionState = null;
      updateActionUI(null);
      try { localStorage.removeItem(getActionKey()); } catch(e) {}
      showToast('⚠️', '送信に失敗しました', 'もう一度お試しください', 3500);
    });
}

function checkActionStatus() {
  if (!customer || !roomId) return;

  // localStorage から即時復元（JSON / 旧文字列の両方対応）
  try {
    var cached = localStorage.getItem(getActionKey());
    if (cached) {
      try {
        var parsed = JSON.parse(cached);
        if (parsed.action_type) updateActionUI(parsed.action_type);
      } catch(e) {
        updateActionUI(cached);
      }
    }
  } catch(e) {}

  // API で feedback + action 両方を一括同期
  fetch(GAS_API_URL + '?action=check_action&customer=' + encodeURIComponent(customer)
    + '&room_id=' + encodeURIComponent(roomId), { redirect: 'follow' })
    .then(function(res) { return res.text(); })
    .then(function(text) {
      try {
        var data = JSON.parse(text);
        if (typeof data.favoriteCount === 'number') favoriteCount = data.favoriteCount;
        if (data.feedback) {
          updateFeedbackUI(data.feedback);
          try { localStorage.setItem(getFeedbackKey(), data.feedback); } catch(e) {}
        }
        if (data.action_type) {
          updateActionUI(data.action_type);
          try { localStorage.setItem(getActionKey(), JSON.stringify({ action_type: data.action_type })); } catch(e) {}
        }
      } catch(e) {}
    })
    .catch(function() {});
}
