name: itandi BB Property Search

on:
  # 定期実行は cron-job.org から workflow_dispatch で実行
  # GitHub Actions の cron は遅延・スキップがあるため使用しない

  # GitHub UI / cron-job.org からのトリガー
  workflow_dispatch:
    inputs:
      force_notify:
        description: "強制通知 (通知済みチェックをスキップ)"
        required: false
        type: boolean
        default: false
      skip_cache:
        description: "キャッシュ無視 (全物件の詳細を再取得)"
        required: false
        type: boolean
        default: false
      test_mode:
        description: "テストモード (テスト顧客のみ・各3物件まで)"
        required: false
        type: boolean
        default: false
      service:
        description: "対象サービス (空欄=全サービス)"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - "itandi"
          - "essquare"
          - "ielove"
          - "itandi,essquare"
          - "itandi,ielove"
          - "essquare,ielove"

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      # ランダムディレイ (0〜5分): アクセスパターンを不規則にする
      # 手動実行時はスキップ
      - name: Random delay
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 300))
          echo "Waiting ${DELAY} seconds before starting..."
          sleep $DELAY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run property search
        env:
          PYTHONUNBUFFERED: "1"
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ITANDI_EMAIL: ${{ secrets.ITANDI_EMAIL }}
          ITANDI_PASSWORD: ${{ secrets.ITANDI_PASSWORD }}
          ESSQUARE_EMAIL: ${{ secrets.ESSQUARE_EMAIL }}
          ESSQUARE_PASSWORD: ${{ secrets.ESSQUARE_PASSWORD }}
          IELOVE_EMAIL: ${{ secrets.IELOVE_EMAIL }}
          IELOVE_PASSWORD: ${{ secrets.IELOVE_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          DRIVE_CLIENT_ID: ${{ secrets.DRIVE_CLIENT_ID }}
          DRIVE_CLIENT_SECRET: ${{ secrets.DRIVE_CLIENT_SECRET }}
          DRIVE_REFRESH_TOKEN: ${{ secrets.DRIVE_REFRESH_TOKEN }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify == 'true' && '1' || '' }}
          SKIP_CACHE: ${{ github.event.inputs.skip_cache == 'true' && '1' || '' }}
          TEST_MODE: ${{ github.event.inputs.test_mode == 'true' && '1' || '' }}
          SERVICE: ${{ github.event.inputs.service }}
        run: python -m itandi_search.run
