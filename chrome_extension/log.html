<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>物件自動取得</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* === Dashboard header === */
    #control-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: #252526;
      border-bottom: 1px solid #404040;
      flex-shrink: 0;
    }

    /* 各セクション共通 */
    .dp-section {
      padding: 8px 14px;
      border-bottom: 1px solid #333;
    }
    .dp-section:nth-child(odd) { border-right: 1px solid #333; }
    .dp-section-title {
      font-size: 10px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }
    .dp-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .dp-row + .dp-row { margin-top: 4px; }

    /* ステータスドット */
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .status-dot.online { background: #4ec9b0; }
    .status-dot.offline { background: #f44747; }
    .status-dot.searching {
      background: #dcdcaa;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* チェックボックスラベル */
    .dp-cb {
      display: flex; align-items: center; gap: 3px;
      font-size: 11px; color: #bbb; cursor: pointer;
    }
    .dp-cb input[type="checkbox"] { margin: 0; cursor: pointer; }

    /* ボタン */
    .dp-btn {
      padding: 3px 10px;
      border: 1px solid #555;
      border-radius: 3px;
      background: #3c3c3c;
      color: #d4d4d4;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      white-space: nowrap;
    }
    .dp-btn:hover { background: #4a4a4a; }
    .dp-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .dp-btn.primary { background: #264f78; border-color: #3a7bd5; color: #fff; }
    .dp-btn.primary:hover:not(:disabled) { background: #305d8f; }
    .dp-btn.danger { background: #6b2020; border-color: #d44; color: #faa; }
    .dp-btn.danger:hover:not(:disabled) { background: #8b2a2a; }

    /* 統計値 */
    .dp-stat { font-size: 11px; color: #888; }
    .dp-stat-val { color: #d4d4d4; font-weight: 600; margin: 0 2px; }
    .dp-stat-err { color: #f44747; font-weight: 600; margin: 0 2px; }
    .dp-stat-dim { color: #555; }

    /* 時刻 */
    .dp-time { font-size: 11px; color: #888; }
    .dp-time-val { color: #aaa; }

    /* 顧客チェックボックスエリア (全幅) */
    .dp-full { grid-column: 1 / -1; }

    /* リンク */
    .dp-link {
      font-size: 11px;
      color: #666;
      text-decoration: none;
      cursor: pointer;
    }
    .dp-link:hover { color: #aaa; }
    .dp-link.warn { color: #844; }

    /* REINS利用テーブル */
    .reins-usage-tbl {
      font-size: 11px;
      border-collapse: collapse;
      width: 100%;
    }
    .reins-usage-tbl th {
      text-align: left;
      color: #888;
      font-weight: normal;
      padding: 1px 8px 1px 0;
    }
    .reins-usage-tbl td {
      padding: 1px 8px 1px 0;
      text-align: right;
    }

    /* === Toolbar (log controls) === */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      background: #2d2d2d;
      border-bottom: 1px solid #404040;
      flex-shrink: 0;
    }
    .toolbar h2 {
      font-size: 12px;
      font-weight: 600;
      color: #999;
    }
    .toolbar button {
      padding: 3px 8px;
      border: 1px solid #555;
      border-radius: 3px;
      background: #3c3c3c;
      color: #d4d4d4;
      cursor: pointer;
      font-size: 11px;
    }
    .toolbar button:hover { background: #4a4a4a; }
    .toolbar label {
      font-size: 11px; color: #999;
      display: flex; align-items: center; gap: 3px; cursor: pointer;
    }
    .toolbar label input { margin: 0; cursor: pointer; }

    /* === Filter bar === */
    #filter-bar {
      display: flex;
      gap: 8px;
      padding: 6px 12px;
      background: #252526;
      border-bottom: 1px solid #404040;
      flex-shrink: 0;
    }
    #filter-bar label {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: #999;
      cursor: pointer;
    }
    #filter-bar input[type="checkbox"] { margin: 0; cursor: pointer; }
    #filter-bar input[type="text"] {
      flex: 1;
      padding: 3px 6px;
      border: 1px solid #555;
      border-radius: 3px;
      background: #3c3c3c;
      color: #d4d4d4;
      font-size: 11px;
      font-family: inherit;
    }

    /* === Log container === */
    #log-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .log-line {
      padding: 1px 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line:hover { background: #2a2d2e; }
    .log-time { color: #6a9955; }
    .log-tag { font-weight: 600; }
    .tag-reins { color: #569cd6; }
    .tag-ielove { color: #ce9178; }
    .tag-itandi { color: #c586c0; }
    .tag-essquare { color: #d7ba7d; }
    .tag-system { color: #888; }
    .log-ok { color: #4ec9b0; }
    .log-warn { color: #dcdcaa; }
    .log-error { color: #f44747; }
    .log-skip { color: #808080; }
    .log-submit { color: #b5cea8; }
    .log-separator { color: #dcdcaa; font-weight: 600; }
    #empty-msg {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- ═══ Dashboard ═══ -->
  <div id="control-panel">

    <!-- 左上: ステータス + 顧客物件検索 -->
    <div class="dp-section">
      <div class="dp-section-title">顧客物件検索</div>
      <div class="dp-row">
        <span id="loginStatus" class="status-dot offline"></span>
        <span id="statusText" style="font-size:11px;color:#888;">未接続</span>
        <a href="help.html" target="_blank" style="font-size:10px;color:#8ec41d;text-decoration:underline;">使い方</a>
      </div>
      <div class="dp-row">
        <label class="dp-cb"><input type="checkbox" id="autoSearchEnabled"> 自動</label>
        <label class="dp-cb"><input type="checkbox" id="enableItandi" checked> itandi</label>
        <label class="dp-cb"><input type="checkbox" id="enableEssquare" checked> ES-Square</label>
        <label class="dp-cb"><input type="checkbox" id="enableIelove" checked> いえらぶ</label>
        <label class="dp-cb"><input type="checkbox" id="enableReins" checked> REINS</label>
      </div>
      <div class="dp-row">
        <button id="searchNowBtn" class="dp-btn primary">今すぐ検索</button>
        <button id="stopSearchBtn" class="dp-btn danger" style="display:none">検索中止</button>
        <button id="adminPageBtn" class="dp-btn" title="検索条件管理ページを開く">条件管理</button>
      </div>
      <div class="dp-row dp-time">
        最終: <span id="lastSearch" class="dp-time-val">-</span>
        &nbsp;次回: <span id="nextSearch" class="dp-time-val">-</span>
      </div>
    </div>

    <!-- 右上: SUUMO巡回 + 入稿 + 空室 -->
    <div class="dp-section">
      <div class="dp-section-title">SUUMO巡回 / 入稿 / 空室確認</div>
      <div class="dp-row">
        <label class="dp-cb"><input type="checkbox" id="suumoPatrolEnabled"> SUUMO巡回</label>
        <button id="suumoPatrolNowBtn" class="dp-btn primary">巡回実行</button>
        <button id="suumoPatrolStopBtn" class="dp-btn danger" style="display:none;">巡回停止</button>
        <span class="dp-stat">N日以内:</span>
        <input type="number" id="suumoPatrolDaysWithin" min="0" max="365" step="1" placeholder="--" style="font-size:11px;padding:2px 4px;background:#2a2a2a;color:#ddd;border:1px solid #555;width:50px;" title="新着絞り込み日数。空欄なら制限なし">
        <button id="suumoConfigBtn" class="dp-btn" title="SUUMO巡回条件管理ページを開く">条件管理</button>
      </div>
      <div class="dp-row">
        <button id="suumoFillNowBtn" class="dp-btn primary">入稿開始</button>
        <button id="availabilityCheckBtn" class="dp-btn" title="送付済み物件の空室状況を全件確認">空室チェック</button>
        <button id="availabilityStopBtn" class="dp-btn danger" style="display:none;" title="空室確認を中断">中断</button>
        <button id="cancellationWatchListBtn" class="dp-btn" title="キャンセル通知希望の物件一覧">キャンセル監視</button>
        <span id="availabilityCheckStatus" class="dp-stat"></span>
      </div>
      <div class="dp-row dp-time">
        最終: <span id="lastSuumoPatrol" class="dp-time-val">-</span>
        &nbsp;次回: <span id="nextSuumoPatrol" class="dp-time-val">-</span>
      </div>
    </div>

    <!-- 左下: 統計 + REINS利用状況 -->
    <div class="dp-section">
      <div class="dp-section-title">統計</div>
      <div class="dp-row dp-stat">
        <span>検出 <span class="dp-stat-val" id="totalFound">0</span></span>
        <span>送信 <span class="dp-stat-val" id="totalSubmitted">0</span></span>
        <span>エラー <span class="dp-stat-err" id="totalErrors">0</span></span>
      </div>
      <table class="reins-usage-tbl" title="REINS課金: 6,000を超えると1件@3円">
        <tr>
          <th></th><th>今日</th><th>月累計</th><th></th>
        </tr>
        <tr>
          <th>REINS 条件検索</th>
          <td><span class="dp-stat-val" id="reinsSearchCount">0</span></td>
          <td><span class="dp-stat-val" id="reinsMonthSearchCount">0</span></td>
          <td class="dp-stat-dim">/ 6,000</td>
        </tr>
        <tr>
          <th>REINS 詳細</th>
          <td><span class="dp-stat-val" id="reinsDetailCount">0</span></td>
          <td><span class="dp-stat-val" id="reinsMonthDetailCount">0</span></td>
          <td class="dp-stat-dim">/ 6,000</td>
        </tr>
      </table>
    </div>

    <!-- 右下: 顧客 + 設定 -->
    <div class="dp-section">
      <div class="dp-section-title">顧客フィルタ</div>
      <div class="dp-row" id="customerCheckboxes" style="flex-wrap:wrap;">
      </div>
      <div class="dp-row" style="margin-top:6px;">
        <a class="dp-link" id="openOptions">設定</a>
        <a class="dp-link warn" id="resetBtn">リセット</a>
      </div>
    </div>

  </div>

  <!-- Log toolbar -->
  <div class="toolbar">
    <h2>ログ</h2>
    <button id="clearBtn">クリア</button>
    <button id="scrollBtn">最新へ</button>
    <label><input type="checkbox" id="autoScroll" checked> 自動スクロール</label>
  </div>

  <!-- Filter bar -->
  <div id="filter-bar">
    <label><input type="checkbox" class="tag-filter" value="itandi" checked> itandi</label>
    <label><input type="checkbox" class="tag-filter" value="essquare" checked> ES-Square</label>
    <label><input type="checkbox" class="tag-filter" value="ielove" checked> いえらぶ</label>
    <label><input type="checkbox" class="tag-filter" value="reins" checked> REINS</label>
    <label><input type="checkbox" class="tag-filter" value="system" checked> システム</label>
    <input type="text" id="searchInput" placeholder="フィルタ...">
  </div>

  <!-- Log output -->
  <div id="log-container">
    <div id="empty-msg">ログはまだありません。検索を開始してください。</div>
  </div>

  <script src="log.js"></script>
</body>
</html>
