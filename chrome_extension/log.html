<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>物件取得ログ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: #2d2d2d;
      border-bottom: 1px solid #404040;
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
    }
    .toolbar button {
      padding: 4px 10px;
      border: 1px solid #555;
      border-radius: 3px;
      background: #3c3c3c;
      color: #d4d4d4;
      cursor: pointer;
      font-size: 11px;
    }
    .toolbar button:hover { background: #4a4a4a; }
    .toolbar .status {
      margin-left: auto;
      font-size: 11px;
      color: #888;
    }
    .toolbar .status.active { color: #4ec9b0; }
    #filter-bar {
      display: flex;
      gap: 8px;
      padding: 6px 12px;
      background: #252526;
      border-bottom: 1px solid #404040;
      flex-shrink: 0;
    }
    #filter-bar label {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: #999;
      cursor: pointer;
    }
    #filter-bar input[type="checkbox"] { margin: 0; cursor: pointer; }
    #filter-bar input[type="text"] {
      flex: 1;
      padding: 3px 6px;
      border: 1px solid #555;
      border-radius: 3px;
      background: #3c3c3c;
      color: #d4d4d4;
      font-size: 11px;
      font-family: inherit;
    }
    #log-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .log-line {
      padding: 1px 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line:hover { background: #2a2d2e; }
    .log-time { color: #6a9955; }
    .log-tag { font-weight: 600; }
    .tag-reins { color: #569cd6; }
    .tag-ielove { color: #ce9178; }
    .tag-system { color: #888; }
    .log-ok { color: #4ec9b0; }
    .log-warn { color: #dcdcaa; }
    .log-error { color: #f44747; }
    .log-skip { color: #808080; }
    .log-submit { color: #b5cea8; }
    #empty-msg {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>物件取得ログ</h1>
    <button id="clearBtn">クリア</button>
    <button id="scrollBtn">最新へ</button>
    <label><input type="checkbox" id="autoScroll" checked> 自動スクロール</label>
    <span id="status" class="status">待機中</span>
  </div>
  <div id="filter-bar">
    <label><input type="checkbox" class="tag-filter" value="reins" checked> REINS</label>
    <label><input type="checkbox" class="tag-filter" value="ielove" checked> いえらぶ</label>
    <label><input type="checkbox" class="tag-filter" value="system" checked> システム</label>
    <input type="text" id="searchInput" placeholder="フィルタ...">
  </div>
  <div id="log-container">
    <div id="empty-msg">ログはまだありません。検索を開始してください。</div>
  </div>
  <script src="log.js"></script>
</body>
</html>
