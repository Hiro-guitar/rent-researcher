<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
      padding: 16px;
      text-align: center;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #666;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.online { background: #22c55e; }
    .status-dot.offline { background: #ef4444; }
    .status-dot.searching {
      background: #f59e0b;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      background: #2563eb;
      color: white;
    }
    .btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="title">物件自動取得</div>
  <div class="status-row">
    <span id="loginStatus" class="status-dot offline"></span>
    <span id="statusText">-</span>
  </div>
  <button id="openDashboard" class="btn">ダッシュボードを開く</button>
  <script src="popup.js"></script>
</body>
</html>
